services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: journeybuddi
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: journeybuddi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journeybuddi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
